<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
    </style>
  </head>
  <body>
    <h1>Система управления агентами</h1>
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 20px;">
    <!-- Первый список -->
    <div style="width: 800px;">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-1">Список агентов</h4>
            </div>
            <div class="card-body">
                <label class="form-label fw-bold">Выберите агента:</label>
                <select class="form-select">
                    <option selected disabled>--Агенты--</option>
                    <option>1 агент</option>
                    <option>2 агент</option>
                </select>
                <button class="btn btn-primary mt-2">+</button>
            </div>
        </div>
    </div>

    <!-- Второй список -->
    <div style="width: 800px;">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-1">Список сценариев</h4>
            </div>
            <div class="card-body">
                <label class="form-label fw-bold">Выберите сценарии:</label>
                <select class="form-select">
                    <option selected disabled>--Сценарии-- </option>
                    <option>1 Сценарий</option>
                    <option>2 Сценарий</option>
                    <option>3 Сценарий</option>
                </select>
                <button class="btn btn-primary mt-2">+</button>
            </div>
        </div>
      </div>
  </body>
</html>
