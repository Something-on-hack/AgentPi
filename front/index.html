<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Управление агентами и сценариями</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      body {
        padding: 20px;
        background: #f4f6f9;
      }
      h1 {
        margin-bottom: 30px;
        color: #0a58ca;
      }
      .card {
        margin-bottom: 20px;
      }
      select[multiple] {
        min-height: 120px;
      }
      #agentSelect,
      #scriptSelect {
        height: 111px;
        padding-top: 15px;
        padding-bottom: 15px;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Система управления агентами и сценариями</h1>

    <div class="container-fluid">
      <div class="row">
        <!-- Колонка исходных списков -->
        <div class="col-md-6">
          <!-- Исходные агенты -->
          <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
              <h4 class="mb-1">📋 Список агентов (исходные)</h4>
            </div>
            <div class="card-body">
              <label class="form-label fw-bold"
                >Выберите агента для добавления в рабочий список:</label
              >
              <select class="form-select" id="agentSelect">
                <option selected disabled>-- Агенты --</option>
                <option
                  value="agent1"
                  data-ip="192.168.1.10"
                  data-key="key123"
                  data-comment="Тестовый агент"
                >
                  Агент 1 (host-1)
                </option>
                <option
                  value="agent2"
                  data-ip="10.0.0.5"
                  data-key="key456"
                  data-comment="Основной"
                >
                  Агент 2 (host-2)
                </option>
              </select>
              <button class="btn btn-outline-primary mt-2" id="addAgentBtn">
                ➕ Добавить нового агента
              </button>
            </div>
          </div>

          <!-- Исходные сценарии -->
          <div class="card shadow-sm mt-3">
            <div class="card-header bg-primary text-white">
              <h4 class="mb-1">📜 Список сценариев (исходные)</h4>
            </div>
            <div class="card-body">
              <label class="form-label fw-bold"
                >Выберите сценарий для добавления в рабочий список:</label
              >
              <select class="form-select" id="scriptSelect">
                <option selected disabled>-- Сценарии --</option>
                <option>Сценарий 1 (nmap)</option>
                <option>Сценарий 2 (мониторинг)</option>
                <option>Сценарий 3 (деплой)</option>
              </select>
              <button class="btn btn-outline-primary mt-2" id="addScriptBtn">
                ➕ Добавить новый сценарий
              </button>
            </div>
          </div>
        </div>

        <!-- Колонка выбранных элементов (рабочие списки) -->
        <div class="col-md-6">
          <!-- Выбранные агенты -->
          <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
              <h4 class="mb-1">✅ Выбранные агенты (рабочий набор)</h4>
            </div>
            <div class="card-body">
              <label class="form-label fw-bold"
                >Агенты, с которыми работаем:</label
              >
              <select
                multiple
                class="form-select"
                id="selectedAgentsList"
                size="4"
              ></select>
              <button
                class="btn btn-sm btn-outline-danger mt-2"
                id="clearSelectedAgentsBtn"
              >
                🗑 Очистить всех выбранных
              </button>
            </div>
          </div>

          <!-- Выбранные сценарии -->
          <div class="card shadow-sm mt-3">
            <div class="card-header bg-success text-white">
              <h4 class="mb-1">✅ Выбранные сценарии (рабочий набор)</h4>
            </div>
            <div class="card-body">
              <label class="form-label fw-bold"
                >Сценарии, с которыми работаем:</label
              >
              <select
                multiple
                class="form-select"
                id="selectedScriptsList"
                size="4"
              ></select>
              <button
                class="btn btn-sm btn-outline-danger mt-2"
                id="clearSelectedScriptsBtn"
              >
                🗑 Очистить все выбранные сценарии
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container-fluid mt-4 px-0">
      <button id="runButton" class="btn btn-success w-100 py-3 fw-bold fs-4">
        🚀 ЗАПУСК
      </button>
    </div>

    <!-- Модальное окно для добавления агента -->
    <div class="modal fade" id="agentModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">➕ Новый агент</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">IP-адрес</label>
              <input
                type="text"
                class="form-control"
                id="agentIp"
                placeholder="192.168.1.100"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Hostname (отображается в списке)</label>
              <input
                type="text"
                class="form-control"
                id="agentHostname"
                placeholder="server-01"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Ключ (key)</label>
              <input
                type="text"
                class="form-control"
                id="agentKey"
                placeholder="your-secret-key"
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Комментарий</label>
              <textarea
                class="form-control"
                id="agentComment"
                rows="2"
                placeholder="Дополнительная информация"
              ></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Отмена
            </button>
            <button type="button" class="btn btn-primary" id="confirmAgentBtn">
              Добавить агента
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Модальное окно для добавления сценария -->
    <div class="modal fade" id="scriptModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">➕ Новый сценарий</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Название сценария</label>
              <input
                type="text"
                class="form-control"
                id="scriptNameInput"
                placeholder="Например: 4 Сценарий"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Отмена
            </button>
            <button type="button" class="btn btn-primary" id="confirmScriptBtn">
              Добавить
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // ==================== ЭЛЕМЕНТЫ DOM ====================
      const agentSelect = document.getElementById("agentSelect");
      const scriptSelect = document.getElementById("scriptSelect");
      const selectedAgentsList = document.getElementById("selectedAgentsList");
      const selectedScriptsList = document.getElementById(
        "selectedScriptsList",
      );
      const addAgentBtn = document.getElementById("addAgentBtn");
      const addScriptBtn = document.getElementById("addScriptBtn");
      const clearSelectedAgentsBtn = document.getElementById(
        "clearSelectedAgentsBtn",
      );
      const clearSelectedScriptsBtn = document.getElementById(
        "clearSelectedScriptsBtn",
      );
      const agentModal = new bootstrap.Modal(
        document.getElementById("agentModal"),
      );
      const scriptModal = new bootstrap.Modal(
        document.getElementById("scriptModal"),
      );
      const agentIp = document.getElementById("agentIp");
      const agentHostname = document.getElementById("agentHostname");
      const agentKey = document.getElementById("agentKey");
      const agentComment = document.getElementById("agentComment");
      const scriptNameInput = document.getElementById("scriptNameInput");
      const confirmAgentBtn = document.getElementById("confirmAgentBtn");
      const confirmScriptBtn = document.getElementById("confirmScriptBtn");
      const runButton = document.getElementById("runButton");

      // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
      function addAgentToSelected(agentId, agentDisplayName, ip, key, comment) {
        for (let i = 0; i < selectedAgentsList.options.length; i++) {
          if (selectedAgentsList.options[i].value === agentId) {
            alert(`Агент "${agentDisplayName}" уже в рабочем списке`);
            return;
          }
        }
        const option = document.createElement("option");
        option.value = agentId;
        option.textContent = agentDisplayName;
        option.dataset.ip = ip;
        option.dataset.key = key;
        option.dataset.comment = comment;
        selectedAgentsList.appendChild(option);
        removePlaceholder(selectedAgentsList);
      }

      function addScriptToSelected(scriptName) {
        for (let i = 0; i < selectedScriptsList.options.length; i++) {
          if (selectedScriptsList.options[i].textContent === scriptName) {
            alert(`Сценарий "${scriptName}" уже в рабочем списке`);
            return;
          }
        }
        const option = document.createElement("option");
        option.textContent = scriptName;
        option.value = scriptName;
        selectedScriptsList.appendChild(option);
        removePlaceholder(selectedScriptsList);
      }

      function removePlaceholder(selectEl) {
        if (selectEl.options.length === 1 && selectEl.options[0].disabled) {
          selectEl.remove(0);
        }
      }

      function addPlaceholderIfEmpty(selectEl, text) {
        if (selectEl.options.length === 0) {
          const placeholder = document.createElement("option");
          placeholder.disabled = true;
          placeholder.textContent = text;
          selectEl.appendChild(placeholder);
        }
      }

      function clearSelectedAgents() {
        while (selectedAgentsList.options.length > 0) {
          selectedAgentsList.remove(0);
        }
        addPlaceholderIfEmpty(selectedAgentsList, "-- список пуст --");
      }

      function clearSelectedScripts() {
        while (selectedScriptsList.options.length > 0) {
          selectedScriptsList.remove(0);
        }
        addPlaceholderIfEmpty(selectedScriptsList, "-- список пуст --");
      }

      // ==================== СОБЫТИЯ ====================
      agentSelect.addEventListener("change", (e) => {
        const selectedOption = agentSelect.options[agentSelect.selectedIndex];
        if (!selectedOption.value || selectedOption.disabled) return;
        const agentId = selectedOption.value;
        const agentDisplayName = selectedOption.textContent;
        const ip = selectedOption.dataset.ip || "";
        const key = selectedOption.dataset.key || "";
        const comment = selectedOption.dataset.comment || "";
        addAgentToSelected(agentId, agentDisplayName, ip, key, comment);
        agentSelect.selectedIndex = 0;
      });

      scriptSelect.addEventListener("change", (e) => {
        const selectedOption = scriptSelect.options[scriptSelect.selectedIndex];
        if (!selectedOption.value || selectedOption.disabled) return;
        const scriptName = selectedOption.textContent;
        addScriptToSelected(scriptName);
        scriptSelect.selectedIndex = 0;
      });

      addAgentBtn.addEventListener("click", () => {
        agentIp.value = "";
        agentHostname.value = "";
        agentKey.value = "";
        agentComment.value = "";
        agentModal.show();
      });

      addScriptBtn.addEventListener("click", () => {
        scriptNameInput.value = "";
        scriptModal.show();
      });

      confirmAgentBtn.addEventListener("click", () => {
        const ip = agentIp.value.trim();
        const hostname = agentHostname.value.trim();
        const key = agentKey.value.trim();
        const comment = agentComment.value.trim();
        if (!ip || !hostname || !key) {
          alert("Пожалуйста, заполните IP, Hostname и Key");
          return;
        }
        const agentId =
          "agent_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const newOption = document.createElement("option");
        newOption.value = agentId;
        newOption.textContent = hostname;
        newOption.dataset.ip = ip;
        newOption.dataset.key = key;
        newOption.dataset.comment = comment;
        agentSelect.appendChild(newOption);
        agentIp.value = "";
        agentHostname.value = "";
        agentKey.value = "";
        agentComment.value = "";
        agentModal.hide();
        addAgentToSelected(agentId, hostname, ip, key, comment);
        agentSelect.selectedIndex = 0;
      });

      confirmScriptBtn.addEventListener("click", () => {
        const newName = scriptNameInput.value.trim();
        if (newName === "") {
          alert("Введите название сценария");
          return;
        }
        const newOption = document.createElement("option");
        newOption.textContent = newName;
        newOption.value = newName;
        scriptSelect.appendChild(newOption);
        scriptNameInput.value = "";
        scriptModal.hide();
        addScriptToSelected(newName);
        scriptSelect.selectedIndex = 0;
      });

      clearSelectedAgentsBtn.addEventListener("click", clearSelectedAgents);
      clearSelectedScriptsBtn.addEventListener("click", clearSelectedScripts);

      // ==================== ЗАПУСК ====================
      runButton.addEventListener("click", () => {
        // Сбор выбранных агентов
        const selectedAgents = [];
        for (let i = 0; i < selectedAgentsList.options.length; i++) {
          const opt = selectedAgentsList.options[i];
          if (opt.disabled) continue;
          selectedAgents.push({
            id: opt.value,
            name: opt.textContent,
            ip: opt.dataset.ip || "",
            key: opt.dataset.key || "",
            comment: opt.dataset.comment || "",
          });
        }

        // Сбор выбранных сценариев
        const selectedScripts = [];
        for (let i = 0; i < selectedScriptsList.options.length; i++) {
          const opt = selectedScriptsList.options[i];
          if (opt.disabled) continue;
          selectedScripts.push(opt.textContent);
        }

        if (selectedAgents.length === 0) {
          alert("Нет выбранных агентов. Добавьте агентов в рабочий набор.");
          return;
        }

        localStorage.setItem("selectedAgents", JSON.stringify(selectedAgents));
        localStorage.setItem(
          "selectedScripts",
          JSON.stringify(selectedScripts),
        );
        window.open("varlogscmd.html", "_blank");
      });

      // Инициализация заглушек
      clearSelectedAgents();
      clearSelectedScripts();
    </script>
  </body>
</html>
